# ══════════════════════════════════════════════════════════════
# Server
# ══════════════════════════════════════════════════════════════
server.port=8080

# ══════════════════════════════════════════════════════════════
# PostgreSQL
# ══════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:naturessence}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ══════════════════════════════════════════════════════════════
# JPA / Hibernate
# ══════════════════════════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ══════════════════════════════════════════════════════════════
# Stripe
# ══════════════════════════════════════════════════════════════
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_51OqNqGC5ybHaz8mY9l2VfjSVZJMfd9JqPLqCecDgbMZ01z7oyOlUEHGJ0R0e6981zkZA5j6gc7Cl8WJJhK8FwUlG00KC5LBy0m}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_replace_with_your_key}

# ══════════════════════════════════════════════════════════════
# Brevo (transactional email API)
# ══════════════════════════════════════════════════════════════
brevo.api-key=${BREVO_API_KEY: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}
brevo.sender-email=${BREVO_SENDER_EMAIL:contact@naturessence.tn}
brevo.sender-name=${BREVO_SENDER_NAME:NaturEssence}
brevo.reply-to=${BREVO_REPLY_TO:rannniakhedri@gmail.com}
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ══════════════════════════════════════════════════════════════
# JWT Configuration
# ══════════════════════════════════════════════════════════════
app.jwt.secret=${JWT_SECRET:NaturEssenceSecretKeyMustBeAtLeast256BitsLongForHS256}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:86400000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ══════════════════════════════════════════════════════════════
# Segment Auto-Calculation Thresholds
# ══════════════════════════════════════════════════════════════
app.segment.fidele.min-orders=5
app.segment.vip.min-spent=5000

# ══════════════════════════════════════════════════════════════
# Request size (for base64 image payloads)
# ══════════════════════════════════════════════════════════════
server.tomcat.max-http-form-urlencoded-content-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ══════════════════════════════════════════════════════════════
# CORS
# ══════════════════════════════════════════════════════════════
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ══════════════════════════════════════════════════════════════
# Seed Admin
# ══════════════════════════════════════════════════════════════
app.seed.admin-email=${SEED_ADMIN_EMAIL:Admin@Antigoneagency.com}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:Admin@123456}
